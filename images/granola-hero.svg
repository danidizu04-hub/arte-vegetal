<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="granolaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D5A38"/>
      <stop offset="100%" stop-color="#2C4228"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#granolaBg)"/>

  <!-- Bowl -->
  <ellipse cx="250" cy="250" rx="160" ry="40" fill="#2C1810" opacity="0.8"/>
  <path d="M90 200 Q90 300 250 310 Q410 300 410 200Z" fill="#FAF6F0"/>
  <ellipse cx="250" cy="200" rx="160" ry="30" fill="#EDE5D8"/>

  <!-- Granola clusters -->
  <g opacity="0.9">
    <!-- Oat clusters -->
    <ellipse cx="180" cy="195" rx="22" ry="10" fill="#C49A3C" transform="rotate(-15 180 195)"/>
    <ellipse cx="220" cy="188" rx="18" ry="8" fill="#8B6F47" transform="rotate(10 220 188)"/>
    <ellipse cx="260" cy="192" rx="20" ry="9" fill="#C49A3C" transform="rotate(-5 260 192)"/>
    <ellipse cx="300" cy="186" rx="24" ry="10" fill="#D4A85A" transform="rotate(20 300 186)"/>
    <ellipse cx="330" cy="198" rx="16" ry="8" fill="#8B6F47" transform="rotate(-10 330 198)"/>
    <!-- Second layer -->
    <ellipse cx="200" cy="208" rx="20" ry="9" fill="#D4A85A" transform="rotate(5 200 208)"/>
    <ellipse cx="245" cy="205" rx="22" ry="10" fill="#C49A3C" transform="rotate(-20 245 205)"/>
    <ellipse cx="290" cy="210" rx="18" ry="8" fill="#8B6F47" transform="rotate(15 290 210)"/>
    <!-- Chocolate chunks -->
    <rect x="168" y="185" width="14" height="10" rx="2" fill="#3D2B1A"/>
    <rect x="250" y="183" width="12" height="9" rx="2" fill="#3D2B1A"/>
    <rect x="315" y="190" width="13" height="9" rx="2" fill="#3D2B1A"/>
    <!-- Seeds -->
    <circle cx="175" cy="205" r="3" fill="#8B6F47"/>
    <circle cx="225" cy="200" r="2.5" fill="#6B8C47"/>
    <circle cx="270" cy="202" r="3" fill="#8B6F47"/>
    <circle cx="310" cy="205" r="2.5" fill="#6B8C47"/>
    <circle cx="195" cy="215" r="2" fill="#C49A3C"/>
    <circle cx="285" cy="218" r="2" fill="#C49A3C"/>
  </g>

  <!-- Honey drizzle -->
  <path d="M150 160 Q160 180 155 200" stroke="#C49A3C" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M350 155 Q345 175 352 198" stroke="#C49A3C" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- Text overlay -->
  <text x="250" y="80" text-anchor="middle" font-family="serif" font-size="28" fill="white" opacity="0.9">Granola Artesanal</text>
  <text x="250" y="108" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#C49A3C">Alta en proteína · Sin azúcar añadida</text>

  <!-- Leaf decoration -->
  <path d="M60 50 Q80 30 100 50 Q80 70 60 50Z" fill="#6B8C47" opacity="0.5"/>
  <path d="M400 340 Q420 320 440 340 Q420 360 400 340Z" fill="#6B8C47" opacity="0.4"/>
</svg>
