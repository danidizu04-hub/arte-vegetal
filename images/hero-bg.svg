<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="heroGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C49A3C" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#8B6F47" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F0EBE1" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#F0EBE1"/>
  <rect width="1200" height="800" fill="url(#heroGrad)"/>
  <!-- Organic leaf motifs -->
  <ellipse cx="200" cy="150" rx="80" ry="40" fill="#3D5A38" opacity="0.04" transform="rotate(-30 200 150)"/>
  <ellipse cx="1000" cy="200" rx="100" ry="50" fill="#8B6F47" opacity="0.05" transform="rotate(20 1000 200)"/>
  <ellipse cx="600" cy="700" rx="120" ry="60" fill="#3D5A38" opacity="0.04" transform="rotate(-10 600 700)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#8B6F47" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#dots)"/>
</svg>
